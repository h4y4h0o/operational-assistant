version: "3.8"

services:

  # --- Base de données Postgres ---
  postgres:
    image: postgres:15
    container_name: ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opsdb
      POSTGRES_USER: opsadmin
      POSTGRES_PASSWORD: opspassword123   # local seulement, jamais en prod
    ports:
      - "5432:5432"         # accessible depuis ton laptop sur localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data   # données persistantes
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql   # crée n8n_db
      - ./schema.sql:/docker-entrypoint-initdb.d/02-schema.sql  # crée les tables ops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsadmin -d opsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- n8n (workflow engine) ---
  n8n:
    image: n8nio/n8n:latest
    container_name: ops-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"         # UI accessible sur http://localhost:5678
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_ENCRYPTION_KEY=cle-locale-32-caracteres-minimum!
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=opsadmin
      - DB_POSTGRESDB_PASSWORD=opspassword123
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/home/node/.n8n-files/data  # chemin autorisé par n8n pour la lecture de fichiers
    depends_on:
      postgres:
        condition: service_healthy        # n8n attend que Postgres soit prêt

volumes:
  postgres_data:
  n8n_data:
